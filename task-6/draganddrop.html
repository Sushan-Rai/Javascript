<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- F1 Drag and Drop Rank Page -->
    <title>Drag and drop Lists</title>
</head>

<body>
    <!-- this is the header -->
    <h1 style="text-align: center;">Rank The F1 Teams</h1>
    <!-- this is the container -->
    <div class="container">
        <div draggable="true" class="box">Ferrari</div>
        <div draggable="true" class="box">Mercedes</div>
        <div draggable="true" class="box">Aston Martin</div>
        <div draggable="true" class="box">Audi</div>
        <div draggable="true" class="box">Red Bull</div>
        <div draggable="true" class="box">Haas</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
